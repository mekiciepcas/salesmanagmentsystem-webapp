<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rectifier Flexible Pricing</title>
    <link rel="stylesheet" href="../styles/pricing.css">
    <script src="../scripts/web-api.js"></script>
</head>
<body class="rf-flex-pricing-page">
    <div class="menubar">
        <div class="menubar-left">
            <div class="menubar-item">
                <button class="menubar-button" id="backToConfigBtn" onclick="location.href='rectifier-pricing.html'">
                    ← Konfigürasyona Dön
                </button>
            </div>
        </div>
        <div class="menubar-right" id="system-config-bar">
            <div class="form-group">
                <label for="systemNameInput">Sistem Adı:</label>
                <input type="text" id="systemNameInput" value="Rectifier System" class="form-input">
            </div>
            <div class="form-group">
                <label for="systemQuantityInput">Adet:</label>
                <input type="number" id="systemQuantityInput" value="1" min="1" class="form-input" style="width: 80px;">
            </div>
            <button class="action-button" id="systemDetailsBtn" onclick="window.open('system-details.html','_blank')" title="Teknik veri sayfasını aç">
                <span>📄 Sistem Detayı</span>
            </button>
            <button class="action-button primary-action" id="finishPricingBtn">
                <span>Maliyetlendirmeyi Bitir</span>
            </button>
            <button class="action-button" id="exportExcelBtn">
                <span>Excele Aktar</span>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="controls">
            <div class="search-combobox" id="productCombobox">
                <input type="text" class="search-combobox-input" id="productSearch" placeholder="Rectifier opsiyon ara veya seç..." autocomplete="off">
                <button type="button" class="search-combobox-toggle">▼</button>
                <div class="search-combobox-dropdown"></div>
                <input type="hidden" id="productSelect">
            </div>
            <select id="subtypeSelect"><option value="">Alt Tip Seçiniz...</option></select>
            <input type="number" id="quantityInput" value="1" min="1">
            <button id="addButton" class="action-button">➕ Ekle</button>
            <button id="manualAddButton" class="action-button">✏️ Manuel Ekle</button>
            <button id="deleteButton" class="action-button">🗑️ Satırları Sil</button>
            <button id="showTotalsButton" class="action-button">💰 Toplamları Göster</button>
        </div>

        <p class="rf-table-scroll-hint" aria-hidden="true">Tablo geniş; dar ekranda yatay kaydırın.</p>

        <div class="rf-table-scroll" role="region" aria-label="Maliyet kalemleri tablosu" tabindex="0">
        <table class="rectifier-flex-table">
            <colgroup>
                <col class="rf-col-check" span="1">
                <col class="rf-col-no" span="1">
                <col class="rf-col-product" span="1">
                <col class="rf-col-desc" span="1">
                <col class="rf-col-cost" span="1">
                <col class="rf-col-qty" span="1">
                <col class="rf-col-total" span="1">
                <col class="rf-col-margin" span="1">
                <col class="rf-col-total2" span="1">
            </colgroup>
            <thead>
                <tr>
                    <th class="col-check"></th>
                    <th class="col-no">No</th>
                    <th class="col-product">Ürün</th>
                    <th class="col-description">Açıklama</th>
                    <th class="col-cost">Maliyet</th>
                    <th class="col-qty">Adet</th>
                    <th class="col-total">Maliyet Tutarı</th>
                    <th class="col-margin">Marj</th>
                    <th class="col-total2">Toplam Tutar</th>
                </tr>
            </thead>
            <tbody id="priceTable"></tbody>
        </table>
        </div>
    </div>
    
    <!-- Batarya Hesaplama Paneli (gerekirse Rectifier için de kullanılabilir) -->
    <div id="batteryCalcPanel" class="calculator-panel">
        <div class="panel-header">
            <h3>🔋 Batarya Hesaplama</h3>
            <button class="panel-close-btn">×</button>
        </div>
        <div class="panel-content">
            <div class="calc-form">
                <div class="form-group">
                    <label>Güç (kVA)</label>
                    <input type="number" id="powerInput" class="calc-input" placeholder="10">
                </div>
                <div class="form-group">
                    <label>Akü Sayısı</label>
                    <input type="number" id="batteryCount" class="calc-input" placeholder="30">
                </div>
                <div class="form-group">
                    <label>Cell</label>
                    <input type="number" id="cellCount" class="calc-input" placeholder="6">
                </div>
                <div class="form-group">
                    <label>String</label>
                    <input type="number" id="stringCount" class="calc-input" placeholder="1">
                </div>
                <div class="form-group">
                    <label>Power Factor</label>
                    <input type="number" id="powerFactorBat" class="calc-input" value="0.8">
                </div>
                <div class="form-group">
                    <label>Efficiency (%)</label>
                    <input type="number" id="efficiencyBat" class="calc-input" value="90">
                </div>
                <button class="calc-button" id="calculateBattery">Hesapla</button>
            </div>
            <div class="calc-results" id="batteryResults">
                <div class="result-item">
                    <span class="result-label">W/Block:</span>
                    <span id="wBlockResult" class="result-value">0 W</span>
                </div>
                <div class="result-item">
                    <span class="result-label">W/Cell:</span>
                    <span id="wCellResult" class="result-value">0 W</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../runtime/adapters/httpClient.js"></script>
    <script src="../scripts/pricing-queue-after-cart.js"></script>
    <script src="../scripts/rectifier-flex-pricing.js"></script>
</body>
</html>
