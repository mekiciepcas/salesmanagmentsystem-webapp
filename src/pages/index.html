<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pricing Pro - Giriş</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      import dbService from '../services/dbService.js';
      window.dbService = dbService;
    </script>
  </head>
  <body>
    <!-- Pencere çerçevesi -->
    <div class="window-frame">
      <div class="window-title">Pricing Pro - Giriş</div>
      <div class="window-controls">
        <button class="window-control minimize" id="minimizeBtn">
          <span>_</span>
        </button>
        <button class="window-control close" id="closeBtn">
          <span>×</span>
        </button>
      </div>
    </div>

    <div class="container">
      <!-- Sol Panel -->
      <div class="left-panel">
        <div class="logo-container">
          <img
            src="../assets/images/EPC_logo1.png"
            alt="EPC Logo"
            class="animated-logo"
          />
        </div>
      </div>

      <!-- Sağ Panel (Giriş Formu) -->
      <div class="login-frame">
        <h1 class="title">Hoş Geldiniz</h1>
        <p class="subtitle">Lütfen hesabınıza giriş yapın</p>

        <form id="loginForm" novalidate>
          <div class="input-container">
            <svg viewBox="0 0 24 24" class="input-icon">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input
              required
              type="text"
              name="username"
              placeholder="Kullanıcı Adı"
              class="modern-input"
              autocomplete="username"
            />
            <label class="input-label">Kullanıcı Adı</label>
          </div>

          <div class="input-container">
            <svg viewBox="0 0 24 24" class="input-icon">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input
              required
              type="password"
              name="password"
              placeholder="Şifre"
              class="modern-input"
              autocomplete="current-password"
            />
            <label class="input-label">Şifre</label>
          </div>

          <div id="error-message" class="error-message"></div>

          <button type="submit" class="login-button">Giriş Yap</button>
          <button type="button" class="exit-button">Çıkış</button>
          <button
            type="button"
            class="register-button"
            onclick="window.location.href='register.html'"
          >
            Yeni Hesap Oluştur
          </button>
        </form>
      </div>
    </div>

    <script src="../scripts/login.js" type="module"></script>
  </body>
</html>
